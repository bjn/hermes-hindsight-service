name: Build Hindsight service image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - docker-compose.yml
      - patches/**
      - tests/**
      - .github/workflows/build-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/bjn/hermes-hindsight-service
  COOLIFY_APPLICATION_UUID: xp4v7cbwglechtgz1k14uo8d
  COOLIFY_API_URL: https://app.coolify.io/api/v1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
      - name: Run hotfix regression tests
        run: python tests/test_db_utils_hotfix.py
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trigger Coolify deploy
        if: github.ref == 'refs/heads/main'
        env:
          COOLIFY_API_KEY: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          test -n "$COOLIFY_API_KEY"
          curl --fail --show-error --silent \
            --get "${COOLIFY_API_URL}/deploy" \
            --header "Authorization: Bearer ${COOLIFY_API_KEY}" \
            --data-urlencode "uuid=${COOLIFY_APPLICATION_UUID}" \
            --data-urlencode "force=false"
